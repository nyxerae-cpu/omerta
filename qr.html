<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>QR Code - WorldBuilder</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <style>
    body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0; background: #f5f5f5; }
    .card { background: white; border-radius: 16px; padding: 40px; box-shadow: 0 4px 24px rgba(0,0,0,0.1); text-align: center; }
    h2 { margin: 0 0 8px; color: #6366f1; }
    p { color: #666; margin: 0 0 24px; font-size: 14px; }
    #qrcode { margin: 0 auto 24px; }
    .url { font-size: 13px; color: #999; word-break: break-all; max-width: 300px; }
    .steps { margin-top: 24px; text-align: left; font-size: 13px; color: #555; background: #f0f0ff; border-radius: 8px; padding: 16px; }
    .steps li { margin-bottom: 6px; }
  </style>
</head>
<body>
  <div class="card">
    <h2>📱 WorldBuilder</h2>
    <p>Scanne avec l'appareil photo de ton téléphone</p>
    <div id="qrcode"></div>
    <div id="share-url" class="url"></div>
    <ol class="steps">
      <li>Ouvre l'appareil photo</li>
      <li>Pointe vers le QR code</li>
      <li>Appuie sur le lien qui apparaît</li>
      <li id="sync-step" style="display:none">Entre le code Sync : <strong id="sync-code"></strong></li>
    </ol>
  </div>
  <script>
    const params = new URLSearchParams(location.search);
    const base = location.href.split('?')[0].replace(/[^/]*$/, '');
    const fallbackUrl = base + 'index.html';
    const shareUrl = params.get('url') || fallbackUrl;
    const syncCode = params.get('code') || '';

    document.getElementById('share-url').textContent = shareUrl;
    if (syncCode) {
      document.getElementById('sync-step').style.display = '';
      document.getElementById('sync-code').textContent = syncCode;
    }

    new QRCode(document.getElementById('qrcode'), {
      text: shareUrl,
      width: 256,
      height: 256,
      colorDark: '#6366f1',
      colorLight: '#ffffff',
      correctLevel: QRCode.CorrectLevel.H
    });
  </script>
</body>
</html>
