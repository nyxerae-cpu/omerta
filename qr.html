<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>QR Code - WorldBuilder</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <style>
    body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0; background: #f5f5f5; }
    .card { background: white; border-radius: 16px; padding: 40px; box-shadow: 0 4px 24px rgba(0,0,0,0.1); text-align: center; }
    h2 { margin: 0 0 8px; color: #6366f1; }
    p { color: #666; margin: 0 0 24px; font-size: 14px; }
    #qrcode { margin: 0 auto 24px; }
    .url { font-size: 13px; color: #999; word-break: break-all; max-width: 300px; }
    .steps { margin-top: 24px; text-align: left; font-size: 13px; color: #555; background: #f0f0ff; border-radius: 8px; padding: 16px; }
    .steps li { margin-bottom: 6px; }
  </style>
</head>
<body>
  <div class="card">
    <h2>📱 WorldBuilder</h2>
    <p>Scanne avec l'appareil photo de ton téléphone</p>
    <div id="qrcode"></div>
    <div class="url">https://swift-bottles-tease.loca.lt</div>
    <ol class="steps">
      <li>Ouvre l'appareil photo</li>
      <li>Pointe vers le QR code</li>
      <li>Appuie sur le lien qui apparaît</li>
      <li>Entre le mot de passe : <strong>176.187.162.162</strong></li>
    </ol>
  </div>
  <script>
    new QRCode(document.getElementById('qrcode'), {
      text: 'https://swift-bottles-tease.loca.lt',
      width: 256,
      height: 256,
      colorDark: '#6366f1',
      colorLight: '#ffffff',
      correctLevel: QRCode.CorrectLevel.H
    });
  </script>
</body>
</html>
